server.port=8080
spring.application.name=webhook-simulator
webhook.secret=your-secret-key-here-change-in-production
logging.level.com.example.webhook=INFO

# Demo: source app fires webhooks to this URL (target app receiver)
webhook.receiver.url=http://localhost:8080/api/webhook/receive
# Demo: target app posts callback results to this URL (source app listener)
source.app.callback-url=http://localhost:8080/api/source/callback
