<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook Simulator - History</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">
            <i class="fas fa-webhook me-2"></i>Webhook Simulator
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="/"><i class="fas fa-tachometer-alt me-1"></i>Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="/history"><i class="fas fa-history me-1"></i>History</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/test"><i class="fas fa-flask me-1"></i>Test</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/learn"><i class="fas fa-graduation-cap me-1"></i>Learn</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/demo"><i class="fas fa-play-circle me-1"></i>Demo</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid mt-4">
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="fas fa-history me-2 text-primary"></i>Webhook History</h5>
            <div class="d-flex align-items-center gap-2">
                <button class="btn btn-sm btn-outline-primary" id="refresh-btn">
                    <i class="fas fa-sync-alt me-1"></i>Refresh
                </button>
                <button class="btn btn-sm btn-outline-danger" id="clear-btn">
                    <i class="fas fa-trash me-1"></i>Clear History
                </button>
            </div>
        </div>
        <div class="card-body">
            <table id="history-table" class="table table-hover table-striped w-100">
                <thead>
                    <tr>
                        <th>Event Type</th>
                        <th>Event ID</th>
                        <th>Status</th>
                        <th>Received At</th>
                        <th>Processed At</th>
                        <th>Retry Count</th>
                        <th>Error</th>
                    </tr>
                </thead>
                <tbody id="history-tbody">
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Detail Modal -->
<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-info-circle me-2"></i>Webhook Detail</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <pre id="detail-content" class="bg-light p-3 rounded"></pre>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>

<script th:inline="none">
    let dataTable;
    const detailModal = new bootstrap.Modal(document.getElementById('detailModal'));

    function formatDateTime(dt) {
        if (!dt) return '-';
        const d = new Date(dt);
        return d.toLocaleString();
    }

    function statusBadge(status) {
        const map = {
            'SUCCESS':    'badge-success',
            'FAILED':     'badge-failed',
            'QUEUED':     'badge-queued',
            'PROCESSING': 'badge-processing'
        };
        const cls = map[status] || 'bg-secondary';
        return `<span class="badge ${cls}">${status}</span>`;
    }

    function loadHistory() {
        $.getJSON('/api/webhook/history?limit=1000', function(data) {
            if (dataTable) {
                dataTable.clear();
                const rows = data.map(r => [
                    r.eventType,
                    `<span class="font-monospace small">${r.eventId}</span>`,
                    statusBadge(r.status),
                    formatDateTime(r.receivedAt),
                    formatDateTime(r.processedAt),
                    r.retryCount,
                    r.errorMessage ? `<span class="text-danger small">${r.errorMessage}</span>` : '-'
                ]);
                dataTable.rows.add(rows).draw();
            }
        });
    }

    $(document).ready(function() {
        dataTable = $('#history-table').DataTable({
            columns: [
                { title: 'Event Type' },
                { title: 'Event ID' },
                { title: 'Status' },
                { title: 'Received At' },
                { title: 'Processed At' },
                { title: 'Retries', className: 'text-center' },
                { title: 'Error' }
            ],
            order: [[3, 'desc']],
            pageLength: 25,
            language: {
                emptyTable: 'No webhook history available'
            }
        });

        loadHistory();

        $('#refresh-btn').on('click', loadHistory);

        $('#clear-btn').on('click', function() {
            if (!confirm('Are you sure you want to clear all webhook history?')) return;
            $.ajax({
                url: '/api/webhook/history',
                method: 'DELETE',
                success: function() {
                    dataTable.clear().draw();
                    alert('History cleared successfully.');
                },
                error: function() {
                    alert('Failed to clear history.');
                }
            });
        });
    });
</script>
</body>
</html>
